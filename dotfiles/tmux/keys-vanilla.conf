# Vanilla keybindings — stock tmux with minimal enhancements
# Keeps C-b prefix and all default bindings intact.
# Sourced by tmux.conf when GMUX_FLAVOR=vanilla.


# -- prefix (defensive) -------------------------------------------------------
# Explicitly set C-b in case gmux flavor was previously loaded in this server.

set -g prefix C-b
bind C-b send-prefix


# -- quality-of-life -----------------------------------------------------------

# Splits retain current path (stock tmux opens in $HOME)
bind '"' split-window -v -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'
