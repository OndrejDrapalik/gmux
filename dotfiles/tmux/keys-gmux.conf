# gmux keybindings — opinionated flavor
# C-Space prefix, remapped keys, Ghostty shortcuts.
# Sourced by tmux.conf when GMUX_FLAVOR != "vanilla".


# -- prefix --------------------------------------------------------------------

set -gu prefix2
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix


# -- unbinds (free keys for reassignment) -------------------------------------

unbind c    # stock: new-window → reassigned to t
unbind d    # stock: detach → reassigned to clear screen
unbind r    # stock: redraw → reassigned to refresh panes


# -- window management --------------------------------------------------------

# New window (retains path)
bind t new-window -c '#{pane_current_path}'

# Navigation (repeatable)
bind n next-window
bind p previous-window
bind -r [ select-window -t :-
bind -r ] select-window -t :+

# Reordering
bind-key -n C-S-Left swap-window -t -1 \; previous-window
bind-key -n C-S-Right swap-window -t +1 \; next-window
bind-key < swap-window -t -1 \; previous-window
bind-key > swap-window -t +1 \; next-window

# Kill
bind x confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind X confirm-before -p "kill-window #W? (y/n)" kill-window


# -- pane management -----------------------------------------------------------

# Splits (retain current path)
bind '"' split-window -v -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'        # same as " (easier to reach)
bind _ split-window -h -c '#{pane_current_path}'        # same as % (easier to reach)
bind M-- split-window -vb                               # new pane above
bind '|' split-window -hf -c '#{pane_current_path}'     # full-height vertical split

# Navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Cycling (repeatable, wraps)
bind -r \; select-pane -t :.-
bind -r "'" select-pane -t :.+

# Resizing (vim-style, repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r -T prefix M-H run-shell -b "~/.tmux/scripts/resize-cycle.sh W"
bind -r -T prefix M-L run-shell -b "~/.tmux/scripts/resize-cycle.sh W"
bind -r -T prefix M-J run-shell -b "~/.tmux/scripts/resize-cycle.sh H"
bind -r -T prefix M-K run-shell -b "~/.tmux/scripts/resize-cycle.sh H"

# Zoom
bind M resize-pane -Z
bind V run-shell '~/.tmux/scripts/half-zoom.sh'

# Layout presets (replace stock select-window on 8/9/0 — windows 1-7 still reachable by number)
# prefix 8: three-pane work layout — left column split 2/1 + full-height right pane.
# Only applies on a clean one-pane window; otherwise shows a skip message.
unbind 8
bind 8 run-shell -b 'window="#{window_id}"; panes=$(tmux display-message -p -t "$window" "##{window_panes}"); if [ "$panes" = 1 ]; then cwd=$(tmux display-message -p -t "$window" "##{pane_current_path}"); tmux split-window -t "$window" -h -c "$cwd"; tmux select-pane -t "$window" -L; tmux split-window -t "$window" -v -l 33% -c "$cwd"; tmux select-pane -t "$window" -U; else tmux display-message -t "$window" "layout preset skipped: window already has panes"; fi'

# prefix 9: weight the work area — left column 2/3 wide, top-left pane 2/3 tall.
unbind 9
bind 9 run-shell -b 'window="#{window_id}"; top_left=$(tmux list-panes -t "$window" -F "##{pane_top} ##{pane_left} ##{pane_id}" | sort -n -k1,1 -k2,2 | awk "NR == 1 { print \$3 }"); [ -n "$top_left" ] && tmux resize-pane -t "$top_left" -y 66%; tmux list-panes -t "$window" -F "##{pane_left} ##{pane_id}" | sort -n | awk "NR == 1 { left=\$1 } \$1 == left { print \$2 }" | while read -r pane; do [ -n "$pane" ] && tmux resize-pane -t "$pane" -x 66%; done'

# prefix ( (Shift+9): mirror of 9 — right pane column 2/3 of the window width.
unbind (
bind ( run-shell -b 'window="#{window_id}"; tmux list-panes -t "$window" -F "##{pane_left} ##{pane_id}" | sort -n | awk "new_right == \"\" || \$1 > new_right { new_right=\$1; panes=\$2; next } \$1 == new_right { panes=panes \" \" \$2 } END { print panes }" | tr " " "\n" | while read -r pane; do [ -n "$pane" ] && tmux resize-pane -t "$pane" -x 66%; done'

# prefix 0: equalize all panes (tiled layout).
unbind 0
bind 0 select-layout tiled

# Naming
bind T command-prompt -I "#T" -p "Pane title:" "select-pane -T '%%'"

# Interrupt current command
bind q send-keys C-c


# -- copy / paste --------------------------------------------------------------

bind C copy-mode
bind v paste-buffer
bind g copy-mode \; send-keys -X history-top \; send-keys -X begin-selection \; send-keys -X history-bottom \; send-keys -X end-of-line \; send-keys -X copy-selection-and-cancel


# -- clear screen --------------------------------------------------------------

bind d send-keys Enter \; send-keys -R \; send-keys C-l \; clear-history
bind M-k send-keys -R \; display-message "Screen cleared (history preserved)"
bind C-k send-keys -R \; clear-history \; display-message "Screen cleared and history cleared"
bind C-l send-keys 'C-l'


# -- utilities -----------------------------------------------------------------

# Refresh all panes (skips agents + dev servers)
bind r run-shell '~/.tmux/scripts/refresh-panes.sh'

# Reload config
bind R source-file ~/.tmux.conf \; \
  run-shell -b "~/.tmux/scripts/tmux-live-port-watcher.sh start" \; \
  display "Config reloaded"

# Linked session for independent window viewing
bind -n C-x run-shell 'tmux new-session -d -t "#{session_name}" -s "#{session_name}-linked" 2>/dev/null; tmux switch-client -t "#{session_name}-linked"'
bind S display-popup -E -w 80% -h 60% "~/.tmux/scripts/tmux-cohort.sh offload"
bind O display-popup -E -w 80% -h 60% "~/.tmux/scripts/tmux-cohort.sh restore"


# -- Ghostty shortcuts (no prefix) --------------------------------------------

bind -n M-1 select-window -t :-      # Cmd+1: previous window
bind -n M-2 select-window -t :+      # Cmd+2: next window
bind -n M-! swap-window -t -1 \; previous-window   # Opt+Cmd+1: reorder left
bind -n M-@ swap-window -t +1 \; next-window       # Opt+Cmd+2: reorder right
bind -n M-` run-shell '~/.tmux/scripts/pane-cycle-clockwise.sh next'  # Cmd+`: clockwise pane cycle
bind -n M-3 run-shell '~/.tmux/scripts/pane-cycle-clockwise.sh prev'   # Cmd+3: counter-clockwise pane cycle
bind -n M-K send-keys Enter \; send-keys -R \; send-keys C-l \; clear-history  # Cmd+Shift+K
bind -n M-m resize-pane -Z           # Hyper+M (F18 → M-m via Ghostty)
bind -n M-h select-pane -L           # Cmd+h: pane left
bind -n M-j select-pane -D           # Cmd+j: pane down
bind -n M-k select-pane -U           # Cmd+k: pane up
bind -n M-l select-pane -R           # Cmd+l: pane right
bind -n M-H run-shell '~/.tmux/scripts/swap-pane-follow.sh left-of'    # Opt+Cmd+h
bind -n M-J run-shell '~/.tmux/scripts/swap-pane-follow.sh down-of'    # Opt+Cmd+j
bind -n C-M-k run-shell '~/.tmux/scripts/swap-pane-follow.sh up-of'    # Opt+Cmd+k
bind -n M-L run-shell '~/.tmux/scripts/swap-pane-follow.sh right-of'   # Opt+Cmd+l
bind -n M-p run-shell '~/.tmux/scripts/recursive-split.sh'             # Cmd+p
bind -n M-P run-shell -b 'printf "%s" "#{pane_current_path}" | pbcopy' # Cmd+Shift+p
