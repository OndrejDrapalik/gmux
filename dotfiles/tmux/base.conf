# gmux — shared base config
# Tokyo Night theme, two-line status bar, agent indicators, plugins.
# This file is sourced by tmux.conf — do not use directly.


# -- general -------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # true-color passthrough
set -sg escape-time 0                       # no delay after Esc
set -g focus-events on
set -g history-limit 50000
set -g set-titles on
set -g set-titles-string "#S"


# -- display -------------------------------------------------------------------

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename off
set -g allow-rename off
set -g monitor-bell on
set -g bell-action any
set -g visual-bell off
set -g status-position top
set -g status-interval 15                   # detection cadence; spinner animates independently
set -g display-panes-time 800
set -g display-time 1000


# -- Tokyo Night theme ---------------------------------------------------------

# Window / pane
set -g window-style "fg=default,bg=default"
set -g window-active-style "bg=#181818"

# Pane borders
set -g pane-border-lines simple
set -g pane-border-status off
set -g pane-border-style "fg=#515151"
set -g pane-active-border-style "fg=#6b7ea0"
set -g pane-border-format ''
set -g pane-border-indicators off

# Pane indicators (prefix + q)
set -g display-panes-colour "#00afff"
set -g display-panes-active-colour "#00afff"

# Messages
set -g message-style "fg=#080808,bg=#ffff00,bold"
set -g message-command-style "fg=#ffff00,bg=default,bold"

# Copy / choice mode
set -g mode-style "fg=#080808,bg=#ffff00,bold"

# Clock
set -g clock-mode-colour "#00afff"
set -g clock-mode-style 24


# -- status bar ----------------------------------------------------------------

set -g status-style "fg=#8a8a8a,bg=default"
set -g status-left-length 100
set -g status-right-length 100

# Left: kanji + session name
set -g status-left " #[fg=#e0af68]水#[fg=#a9b1d6]#S  "

# Right: prefix indicator + synchronized indicator
set -g status-right "#{?client_prefix,#[fg=#a9b1d6]⌨ ,}#{?pane_synchronized,#[fg=#a9b1d6]⚏ ,}"


# -- window status -------------------------------------------------------------

set -g window-status-separator "  "

set -g window-status-style "fg=#565f89,bg=default"
set -g window-status-current-style "fg=#B18FF0,bg=default"
set -g window-status-activity-style "fg=#565f89,bg=default"
set -g window-status-bell-style "fg=#ffff00,bg=default,blink,bold"
set -g window-status-last-style "fg=#565f89,bg=default"

# Window tab format: dot indicator + name + agent status + zoom flag
# Dot colors: yellow=bell, pulse=agent working, green=port, gray=idle
set -g window-status-format "#{?window_bell_flag,#[fg=#ffff00]⏺,#{?#{==:#{@busy},1},#[fg=#A8B3D6]#{?#{@spin},#{@spin},●},#{?#{==:#{@has_port},1},#[fg=#60D701]⏺,#[fg=#3b4261]⏺}}} #{?#{==:#{@busy},1},#[fg=#A8B2D6]#{@wname},#[default]#{@wname}}#(~/.tmux/scripts/tmux-window-status.sh #{window_id} 0)#{?window_zoomed_flag, Z,}#[default]"
set -g window-status-current-format "#{?window_bell_flag,#[fg=#ffff00]⏺,#{?#{==:#{@busy},1},#[fg=#B18FF0]#{?#{@spin},#{@spin},●},#[fg=#B18FF0]⏺}} #[default]#{@wname}#(~/.tmux/scripts/tmux-window-status.sh #{window_id} 1)#{?window_zoomed_flag, Z,}#[default]"


# -- two-line status bar -------------------------------------------------------

# Line 0: main status (left + window list + right)
set -g status 2
set -g status-format[0] '#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]'

# Line 1: subtle separator under the main status line.
set -g status-format[1] '#[fg=#101118]------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------'


# -- mouse ---------------------------------------------------------------------

# Status line 1 is visual only.


# -- copy mode (vi) ------------------------------------------------------------

set-window-option -g mode-keys vi

bind -T copy-mode-vi v send -X begin-selection

# Platform-aware clipboard: macOS uses pbcopy, Linux uses xclip/xsel/wl-copy
if-shell "command -v pbcopy >/dev/null 2>&1" {
  bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
  bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
} {
  bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard 2>/dev/null || xsel --clipboard 2>/dev/null || wl-copy 2>/dev/null"
  bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "xclip -selection clipboard 2>/dev/null || xsel --clipboard 2>/dev/null || wl-copy 2>/dev/null"
}


# -- hooks ---------------------------------------------------------------------

# Auto-name new panes
set-hook -g after-split-window 'select-pane -T "pane #{window_panes}"'

# Auto-setup new windows
set-hook -g after-new-window 'rename-window "#{window_index} zsh" ; select-pane -T "pane 1"'

# Auto-setup new sessions
set-hook -g after-new-session 'select-pane -T "pane 1"'

# Re-apply window tab formatting on attach / session switch / window select
set-hook -g client-attached         'set -g window-status-separator "  "'
set-hook -g client-session-changed  'set -g window-status-separator "  "'
set-hook -g after-select-window     'set -g window-status-separator "  "'


# -- plugins (TPM) -------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-save-interval '15'
set -g @continuum-restore 'off'

# Auto-install TPM if missing
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM (must be at the very bottom of base.conf)
run '~/.tmux/plugins/tpm/tpm'


# -- port watcher --------------------------------------------------------------

run-shell -b '~/.tmux/scripts/tmux-live-port-watcher.sh start'
run-shell -b '~/.tmux/scripts/tmux-agent-spinner.sh restart'
