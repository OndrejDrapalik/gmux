# gmux — entry point
# Sources shared theme/UI, then loads keybindings based on $GMUX_FLAVOR.
#
# Flavors:
#   gmux (default) — C-Space prefix, remapped keys, Ghostty shortcuts
#   vanilla         — stock C-b prefix, all default bindings
#
# Switch flavor: export GMUX_FLAVOR=vanilla (in shell profile or inline)

source-file ~/.tmux/base.conf

if-shell '[ "$GMUX_FLAVOR" = "vanilla" ]' \
  'source-file ~/.tmux/keys-vanilla.conf' \
  'source-file ~/.tmux/keys-gmux.conf'
